apiVersion: dcm.io/v1
kind: Application
metadata:
  name: spring-petclinic
  labels:
    env: prod
spec:
  components:
    - name: database
      type: postgres
      colocateWith: app
      labels:
        tier: data
        env: prod
      properties:
        version: "16"
        storage: 20Gi
        maxConnections: 200

    - name: app
      type: container
      dependsOn:
        - database
      requires:
        - loadbalancer
      labels:
        tier: backend
        env: prod
      properties:
        image: springcommunity/spring-framework-petclinic:6.1.2
        replicas: 2
        port: 8080
        service:
          type: LoadBalancer
          port: 80
        env:
          SPRING_DATASOURCE_URL: "${database.outputs.connectionString}"

    - name: app-dns
      type: dns
      dependsOn:
        - app
      labels:
        tier: network
      properties:
        zone: example.ondra
        record: petclinic.example.ondra
        type: A
        value: "${app.outputs.ip}"
        ttl: 300
