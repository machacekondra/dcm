apiVersion: dcm.io/v1
kind: Policy
metadata:
  name: production-placement
spec:
  rules:
    - name: eu-data-residency
      priority: 100
      match:
        labels:
          env: production
          data-residency: eu
      providers:
        preferred: [aws-eu-west-1, gcp-europe-west1]
        forbidden: [aws-us-east-1]

    - name: critical-postgres-on-aws
      priority: 90
      match:
        type: postgres
        labels:
          tier: critical
      providers:
        preferred: [mock]
      properties:
        multiAz: true
        backupRetention: 30d

    - name: cost-optimized-containers
      priority: 50
      match:
        type: container
        labels:
          cost: optimize
      providers:
        strategy: cheapest
