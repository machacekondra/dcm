apiVersion: dcm.io/v1
kind: Application
metadata:
  name: my-web-app
  labels:
    env: production
    team: platform
spec:
  components:
    - name: database
      type: postgres
      labels:
        tier: data
      properties:
        version: "16"
        storage: 50Gi

    - name: cache
      type: redis
      labels:
        tier: data
      properties:
        version: "7"
        maxMemory: 1Gi

    - name: backend
      type: container
      dependsOn: [database, cache]
      labels:
        tier: backend
      properties:
        image: myapp/backend:latest
        replicas: 3
        env:
          DATABASE_URL: "${database.outputs.connectionString}"
          REDIS_URL: "${cache.outputs.endpoint}"

    - name: frontend
      type: static-site
      dependsOn: [backend]
      labels:
        tier: frontend
      properties:
        source: ./frontend
        apiEndpoint: "${backend.outputs.url}"
