apiVersion: dcm.io/v1
kind: Application
metadata:
  name: spring-petclinic
  labels:
    framework: spring-boot
    team: platform
spec:
  components:
    - name: database
      type: postgres
      colocateWith: app
      labels:
        tier: data
      properties:
        version: "16"
        storage: 20Gi
        maxConnections: 200

    - name: app
      type: container
      dependsOn:
        - database
      requires:
        - loadbalancer
      labels:
        tier: backend
      properties:
        image: springcommunity/spring-petclinic:latest
        replicas: 2
        port: 8080
        env:
          SPRING_PROFILES_ACTIVE: postgres
          SPRING_DATASOURCE_URL: "${database.outputs.connectionString}"
          SPRING_DATASOURCE_USERNAME: petclinic
          SPRING_DATASOURCE_PASSWORD: petclinic

    - name: app-ip
      type: ip
      dependsOn:
        - app
      requires:
        - loadbalancer
      colocateWith: app
      labels:
        tier: network
      properties:
        pool: production
